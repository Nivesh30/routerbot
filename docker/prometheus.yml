# ──────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration — RouterBot
# ──────────────────────────────────────────────────────────────────────────────
# Enable with: docker compose --profile monitoring up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "routerbot"
    metrics_path: /metrics
    static_configs:
      - targets: ["routerbot:8000"]
        labels:
          service: "routerbot"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
